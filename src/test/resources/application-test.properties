spring.application.name=liber-test

# Datasource e populado pelo @ServiceConnection do Testcontainers
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

# JWT — chave de teste (32+ bytes)
app.jwt.secret=test-secret-com-pelo-menos-32-bytes-para-HS256-1234567890
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000
app.jwt.issuer=liber-test

# Regras de negocio (mesmas defaults)
app.emprestimo.prazo-padrao-dias=7
app.emprestimo.prazo-maximo-dias=30
app.emprestimo.limite-por-aluno=3
app.reserva.validade-dias=3

# Seeders desligados nos testes (testes criam seus proprios dados)
app.admin.seed-enabled=false
app.admin.email=admin@test.local
app.admin.nome=Admin Test
app.admin.password=
app.seed.dados-exemplo=false

# CORS
app.cors.allowed-origins=http://localhost
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Defaults para os testes
app.auth.public-register-enabled=true
app.rate-limit.login.enabled=false
app.rate-limit.login.capacity=5
app.rate-limit.login.refill-tokens=5
app.rate-limit.login.refill-period-seconds=60

app.account-lockout.enabled=true
app.account-lockout.max-tentativas=5
app.account-lockout.bloqueio-minutos=15

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
