# =============================================================================
# application-prod.properties — ajustes do profile PROD
# =============================================================================
# Aplicado sobre application.properties quando o profile ativo e "prod".

# Sem SQL no log; nivel de log enxuto
spring.jpa.show-sql=false
logging.level.root=INFO
logging.level.com.liber=INFO

# Logs estruturados em JSON (Elastic Common Schema) — prontos para ingestao
# por Loki/ELK/CloudWatch. Recurso nativo do Spring Boot, sem dependencia extra.
logging.structured.format.console=ecs

# Nao expor mensagens internas no /error padrao do Spring
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Swagger desabilitado em producao — a documentacao completa da API (todos os
# endpoints, schemas e DTOs) nao deve ficar publica, facilita reconhecimento.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
