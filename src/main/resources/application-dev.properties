# =============================================================================
# application-dev.properties — ajustes do profile DEV
# =============================================================================
# Aplicado sobre application.properties quando o profile ativo e "dev".

# SQL visivel no console e logs mais verbosos ajudam o desenvolvimento
spring.jpa.show-sql=true
logging.level.com.liber=DEBUG

# Mensagens de erro detalhadas no /error padrao (so em dev)
server.error.include-message=always
server.error.include-binding-errors=always
