spring.application.name=liber

# Profile ativo (dev / prod / test). Default: dev. Sobrescreva com a env var SPRING_PROFILES_ACTIVE.
# Este arquivo e a base comum; application-{dev,prod}.properties aplicam ajustes por ambiente.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===== Datasource (PostgreSQL) =====
# Defaults compativeis com a imagem oficial postgres no Docker.
# Em producao, sobrescrever via variaveis de ambiente:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Subir local: docker run --name liber-pg -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=liber -p 5432:5432 -d postgres:16
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/liber}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (pool de conexoes — defaults sao sensatos, ajustar em prod conforme carga)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ===== JPA / Hibernate =====
# Schema e gerenciado por Flyway. Hibernate apenas valida que o DB bate com as entidades.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== Flyway =====
# baseline-on-migrate=true permite rodar contra um banco preexistente
# (gerado anteriormente pelo ddl-auto=update) sem perder dados — Flyway marca
# o estado atual como baseline na primeira execucao.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# ===== Swagger / OpenAPI (springdoc) =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===== JWT / Tokens =====
# OBRIGATORIO sobrescrever em prod via env var JWT_SECRET.
# Para HS256 a chave precisa ter no minimo 32 bytes (256 bits). Gerar com: openssl rand -base64 48
app.jwt.secret=${JWT_SECRET:dev-only-secret-trocar-em-prod-com-no-minimo-32-bytes-ABCDEF1234567890}
# Access token curto (15 min) — reduz a janela de uso de um token vazado
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
# Refresh token longo (7 dias) — opaco, armazenado com hash e revogavel
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.issuer=${JWT_ISSUER:liber}

# ===== Server =====
server.port=${SERVER_PORT:8080}
server.error.include-message=on_param
server.error.include-stacktrace=never
server.error.include-binding-errors=on_param
# Graceful shutdown — aguarda requests em andamento terminarem antes de desligar
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===== Forwarded headers (anti-spoofing de IP) =====
# `native` ativa o RemoteIpValve do Tomcat: getRemoteAddr() so e substituido pelo
# valor de X-Forwarded-For quando o request vem de um proxy confiavel (lista abaixo).
# Sem isso, qualquer atacante na internet podia forjar X-Forwarded-For e burlar
# rate limit por IP / lockout por IP. Com isso, o spoofing so funciona se a
# requisicao realmente vier do nginx (mesma rede docker, IP 172.x).
server.forward-headers-strategy=native
# Regex que casa com IPs de proxies confiaveis (loopback + RFC1918 + docker default).
# Se voce mudar a topologia de rede (ex: outro CIDR), ajuste aqui.
server.tomcat.remoteip.internal-proxies=127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|::1|10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|172\\.(1[6-9]|2[0-9]|3[0-1])\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}

# ===== Paginacao =====
# Limita tamanho de pagina aceito pelo Spring Data (evita DoS via ?size=99999)
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=50

# ===== Auth =====
# Registro publico DESABILITADO por padrao — qualquer um na internet criaria uma
# conta BIBLIOTECARIO com acesso de escrita ao catalogo/alunos/emprestimos.
# Bibliotecarios devem ser criados por um ADMIN via POST /api/v1/usuarios.
app.auth.public-register-enabled=${AUTH_PUBLIC_REGISTER_ENABLED:false}

# ===== Rate limiting (login) =====
# Token bucket por IP. In-memory — para multi-instancia, trocar por backing Redis.
app.rate-limit.login.enabled=${RATE_LIMIT_LOGIN_ENABLED:true}
app.rate-limit.login.capacity=${RATE_LIMIT_LOGIN_CAPACITY:5}
app.rate-limit.login.refill-tokens=${RATE_LIMIT_LOGIN_REFILL:5}
app.rate-limit.login.refill-period-seconds=${RATE_LIMIT_LOGIN_PERIOD_S:60}

# ===== Account lockout (bloqueio por conta) =====
# Complementa o rate limit por IP — protege contra brute-force distribuido (varios IPs, mesma conta).
app.account-lockout.enabled=${ACCOUNT_LOCKOUT_ENABLED:true}
app.account-lockout.max-tentativas=${ACCOUNT_LOCKOUT_MAX_TENTATIVAS:5}
app.account-lockout.bloqueio-minutos=${ACCOUNT_LOCKOUT_BLOQUEIO_MIN:15}

# ===== Actuator =====
# Exposicao publica apenas de health e info. Demais endpoints (metrics, env, etc.)
# requerem ADMIN — ver SecurityConfig.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true
info.app.name=AcervoLiber
info.app.version=@project.version@

# ===== Capas de livro =====
# Chave da Google Books API (OPCIONAL). Sem ela, apenas a Open Library e
# consultada — cobertura menor de livros nacionais. Com ela, a Google Books e
# consultada primeiro, com cobertura bem maior.
# Como gerar (gratis): console.cloud.google.com -> criar projeto -> ativar
# "Books API" -> Credenciais -> Criar credencial -> Chave de API.
app.capas.google-books-api-key=${GOOGLE_BOOKS_API_KEY:}

# Upload de capa propria — limite do arquivo. O servico valida 2 MB; estes
# limites de multipart sao apenas a barreira externa.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ===== Regras de negocio =====
app.emprestimo.prazo-padrao-dias=${EMPRESTIMO_PRAZO_PADRAO_DIAS:7}
app.emprestimo.prazo-maximo-dias=${EMPRESTIMO_PRAZO_MAXIMO_DIAS:30}
app.emprestimo.limite-por-aluno=${EMPRESTIMO_LIMITE_POR_ALUNO:3}
# Maximo de renovacoes por emprestimo (0 desabilita renovacao)
app.emprestimo.max-renovacoes=${EMPRESTIMO_MAX_RENOVACOES:2}
# Dias que uma reserva pendente permanece valida antes de expirar
app.reserva.validade-dias=${RESERVA_VALIDADE_DIAS:3}

# ===== Seeder admin =====
# Em prod, setar ADMIN_PASSWORD explicitamente via env var.
# Se app.admin.password ficar vazio, o seeder gera uma senha aleatoria e a loga uma unica vez no startup.
app.admin.seed-enabled=${ADMIN_SEED_ENABLED:true}
app.admin.email=${ADMIN_EMAIL:admin@liber.local}
app.admin.nome=${ADMIN_NOME:Administrador}
app.admin.password=${ADMIN_PASSWORD:}

# ===== Seeder de dados de exemplo (dev/testes) =====
# Quando true E as tabelas estiverem vazias, popula livros/alunos/emprestimos realistas.
# Manter false em producao.
app.seed.dados-exemplo=${SEED_DADOS_EXEMPLO:false}

# ===== CORS =====
# Em prod, sobrescrever via env var CORS_ALLOWED_ORIGINS=https://app.escola.com,https://admin.escola.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
