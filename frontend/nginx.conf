# =============================================================================
# Nginx — serve a SPA e faz proxy reverso da API para o backend
# =============================================================================
# Frontend e API ficam na MESMA origem (http://host/ e http://host/api/...),
# entao nao ha CORS. Em producao, faca a terminacao TLS aqui (bloco 443 com
# certificados montados) ou num proxy/balanceador na frente deste container.

server {
    # 8080 (nao 80) porque o nginx roda como usuario nao-root (imagem unprivileged).
    # Portas abaixo de 1024 exigem root ou capability NET_BIND_SERVICE; mapeamento
    # 8080 -> porta do host fica no docker-compose.
    listen       8080;
    server_name  _;

    # Tamanho maximo de upload (capas, etc.)
    client_max_body_size 5m;

    # Compressao — reduz bastante o tradego do bundle JS/CSS
    gzip               on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_types         text/plain text/css application/javascript application/json
                       image/svg+xml application/xml font/woff2;

    # Cabecalhos de seguranca basicos
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-Frame-Options        "DENY"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- API: proxy reverso para o backend Spring Boot ----
    # "app" e o nome do servico no docker-compose (resolvido pela rede interna).
    location /api/ {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # IMPORTANTE: usar $remote_addr (apenas o IP que o nginx ve) — NUNCA
        # $proxy_add_x_forwarded_for (que ANEXA o header X-Forwarded-For enviado
        # pelo cliente). Anexar permite que um atacante forje o header com IPs
        # arbitrarios; o backend confia em proxies internos e usaria a primeira
        # entrada nao-interna como "IP real" — burlando o rate limit por IP.
        # Sobrescrever fecha a brecha: app ve so o IP que o nginx realmente recebeu.
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # ---- Assets com hash no nome: cache longo e imutavel ----
    location /assets/ {
        root      /usr/share/nginx/html;
        expires   1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- SPA: qualquer rota cai no index.html (React Router) ----
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
