# =============================================================================
# Deploy GCP — build de imagens (amd64) + push GHCR + deploy SSH na VM GCP
# =============================================================================
# Dispara apenas em push para `main` (apos PR mergeado) ou manualmente.
# Recomendado: configurar branch protection em main exigindo o CI verde
# (workflow ci.yml) antes do merge.
#
# Diferenca vs deploy.yml (Oracle):
# - Build amd64 (e2-micro é Intel x86, não ARM como Oracle Ampere A1)
# - SSH user padrão GCP é nome do usuário Google (alissonprogp1) em vez de opc/ubuntu
# - Usa docker-compose.gcp.yml (sem serviço postgres, aponta pra Neon)
#
# Secrets necessarios no repo (Settings -> Secrets and variables -> Actions):
#   GCP_SSH_HOST          IP publico da VM GCP (atualmente 35.209.237.6 — pode mudar)
#   GCP_SSH_USER          alissonprogp1 (ou outro nome de usuário Google)
#   GCP_SSH_PRIVATE_KEY   chave SSH privada autorizada na VM (via metadata ssh-keys ou OS Login)
#   GCP_DEPLOY_PATH       /home/alissonprogp1/liber
#   GHCR_PULL_TOKEN       PAT com escopo read:packages (só necessário se imagens GHCR privadas;
#                         pra repo+packages publicos, deixe em branco)
#
# Pre-requisitos na VM (ja configurado em 2026-05-24):
#   1. docker + docker compose v2 instalados
#   2. git clone <repo> em $GCP_DEPLOY_PATH (já clonado em /home/alissonprogp1/liber)
#   3. .env.prod criado em $GCP_DEPLOY_PATH/.env.prod com secrets reais
#   4. Swap 2GB ativo (senão build dá OOM)
#   5. SSH keys configuradas (gerar via GCP Console -> Metadata -> SSH keys, OU usar OS Login)
# =============================================================================

name: Deploy GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/liber-app
  IMAGE_FRONTEND: ${{ github.repository_owner }}/liber-frontend

jobs:
  build-and-push:
    name: Build & push imagens (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------- Backend ----------------------
      - name: Metadata backend (tags + labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build & push backend (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend-amd64
          cache-to: type=gha,mode=max,scope=backend-amd64

      # ---------------------- Frontend ----------------------
      - name: Metadata frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build & push frontend (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend-amd64
          cache-to: type=gha,mode=max,scope=frontend-amd64

  deploy:
    name: Deploy na VM GCP (SSH)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Conectar via SSH e atualizar stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_SSH_HOST }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -eu
            cd "${{ secrets.GCP_DEPLOY_PATH }}"

            # 1. Atualiza arquivos (Caddyfile, docker-compose.gcp.yml, scripts) via git
            git fetch --depth=1 origin main
            git reset --hard origin/main

            # 2. Login no GHCR para pull (só necessário se imagens privadas)
            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | \
                docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi

            # 3. Aponta as imagens pro GHCR (sobrepõe os defaults do compose)
            export APP_IMAGE="ghcr.io/${{ github.repository_owner }}/liber-app:latest"
            export FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/liber-frontend:latest"

            # 4. Pull + recreate (sem build local — confiança no que veio do CI)
            docker compose \
              -f docker-compose.gcp.yml \
              --env-file .env.prod \
              pull

            docker compose \
              -f docker-compose.gcp.yml \
              --env-file .env.prod \
              up -d --no-build --remove-orphans

            # 5. Limpeza de imagens orfas (> 72h) pra não encher o disco
            docker image prune -af --filter "until=72h" || true

            # 6. Verifica saúde
            sleep 15
            docker compose -f docker-compose.gcp.yml ps
