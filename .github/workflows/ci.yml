# =============================================================================
# CI — build e testes do backend (Spring Boot) e do frontend (React/Vite)
# =============================================================================
# Roda em todo push e pull request. O job do backend executa `mvnw verify`,
# que inclui os testes de integracao (Testcontainers) — os runners do GitHub
# ja tem Docker disponivel, entao eles rodam de verdade aqui.

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    name: Backend (build + testes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build + testes (unitarios + integracao)
        run: ./mvnw -B --no-transfer-progress verify

      - name: Publicar relatorios de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-backend
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build (typecheck + bundle)
        run: npm run build
