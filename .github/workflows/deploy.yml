# =============================================================================
# Deploy — build de imagens (ARM64) + push GHCR + deploy SSH na VM Oracle
# =============================================================================
# Dispara apenas em push para `main` (apos PR mergeado) ou manualmente.
# Recomendado: configurar branch protection em main exigindo o CI verde
# (workflow ci.yml) antes do merge.
#
# Secrets necessarios no repo (Settings -> Secrets and variables -> Actions):
#   SSH_HOST           IP publico da VM Oracle
#   SSH_USER           usuario da VM (ubuntu na imagem Canonical, opc no Oracle Linux)
#   SSH_PRIVATE_KEY    chave privada SSH (a publica fica autorizada na VM)
#   DEPLOY_PATH        caminho do projeto na VM (ex: /home/ubuntu/liber)
#   GHCR_PULL_TOKEN    PAT com escopo read:packages (so necessario se imagens privadas;
#                      pra repo+packages publicos, deixe em branco)
#
# Pre-requisitos na VM (uma unica vez, manual):
#   1. docker + docker compose v2 instalados
#   2. git clone <repo> em $DEPLOY_PATH
#   3. .env.prod criado em $DEPLOY_PATH/.env.prod com secrets reais
#   4. docker volume create liber-pg-data
#   5. mkdir -p $DEPLOY_PATH/backups
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/liber-app
  IMAGE_FRONTEND: ${{ github.repository_owner }}/liber-frontend

jobs:
  build-and-push:
    name: Build & push imagens (ARM64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configurar QEMU (emulacao ARM64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------- Backend ----------------------
      - name: Metadata backend (tags + labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build & push backend (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ---------------------- Frontend ----------------------
      - name: Metadata frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build & push frontend (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy na VM Oracle (SSH)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Conectar via SSH e atualizar stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Timeout maior porque o pull das imagens ARM pode demorar na 1a vez
          command_timeout: 15m
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"

            # 1. Atualiza Caddyfile/docker-compose/scripts a partir do git
            git fetch --depth=1 origin main
            git reset --hard origin/main

            # 2. Login no GHCR para pull (so necessario se imagens privadas)
            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | \
                docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi

            # 3. Aponta as imagens pro GHCR (sobrepoe os defaults do compose)
            export APP_IMAGE="ghcr.io/${{ github.repository_owner }}/liber-app:latest"
            export FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/liber-frontend:latest"

            # 4. Pull + recreate (sem build local — confianca no que veio do CI)
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.prod \
              pull

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.prod \
              up -d --no-build --remove-orphans

            # 5. Limpeza de imagens orfas (> 72h) pra nao encher o disco
            docker image prune -af --filter "until=72h" || true

            # 6. Verifica saude
            sleep 10
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
